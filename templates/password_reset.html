{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="mb-3">Réinitialisation du mot de passe</h2>
            <p class="text-muted">Entrez le code à 6 chiffres envoyé par email, puis définissez votre nouveau mot de passe.</p>
            <form method="POST">
                <div class="mb-3">
                    <label for="code" class="form-label">Code de vérification</label>
                    <input type="text" class="form-control" id="code" name="code" maxlength="6" pattern="[0-9]{6}" required placeholder="Ex: 123456">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Nouveau mot de passe</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-3">
                    <label for="password2" class="form-label">Confirmer le mot de passe</label>
                    <input type="password" class="form-control" id="password2" name="password2" required>
                </div>
                <button type="submit" class="btn btn-brand w-100">Réinitialiser le mot de passe</button>
            </form>
            <p class="mt-3 text-center"><a href="{{ url_for('auth.reset_password_request') }}">Renvoyer un code</a></p>
            <p class="mt-2 text-center"><a href="{{ url_for('auth.login') }}">Retour connexion</a></p>
        </div>
    </div>
</div>
{% endblock %}
