{% extends "base.html" %}

{% block content %}
<div class="container py-5 text-center">
    <h1 class="mb-4">🏆 Question pour un Champion</h1>
    <p class="lead">Testez vos connaissances sur les animes !</p>

    <div class="row justify-content-center mt-5">
        <div class="col-md-8">
            <div class="card shadow-lg p-5">
                <h2 class="mb-5">{{ question }}</h2>
                
                <div class="row row-cols-1 row-cols-md-2 g-4">
                    {% for choice in choices %}
                    <div class="col">
                        <button class="btn btn-outline-brand w-100 py-3" data-answer="{{ choice }}" onclick="checkAnswer(this)">{{ choice }}</button>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <div id="result" class="mt-5 d-none">
        <h2 id="result-text"></h2>
        <div class="mt-4">
            <a href="{{ url_for('extra.quiz') }}" class="btn btn-brand">Question suivante</a>
            <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">Retour</a>
        </div>
    </div>
</div>

<script>
    const correctAnswer = "{{ correct_answer }}";
    let answered = false;

    function checkAnswer(element) {
        if (answered) return;
        answered = true;

        const selectedAnswer = element.getAttribute('data-answer');
        const resultDiv = document.getElementById('result');
        const resultText = document.getElementById('result-text');

        if (selectedAnswer === correctAnswer) {
            element.classList.remove('btn-outline-brand');
            element.classList.add('btn-success');
            resultText.innerText = "✅ Exactement ! Bien joué.";
            resultText.className = "text-success";
        } else {
            element.classList.remove('btn-outline-brand');
            element.classList.add('btn-danger');
            // Highlight correct one
            document.querySelector(`[data-answer="${correctAnswer}"]`).classList.remove('btn-outline-brand');
            document.querySelector(`[data-answer="${correctAnswer}"]`).classList.add('btn-success');
            resultText.innerText = `❌ Raté ! La bonne réponse était '${correctAnswer}'.`;
            resultText.className = "text-danger";
        }

        resultDiv.classList.remove('d-none');
    }
</script>

<style>
    .bg-brand { background-color: #ff4757; }
    .btn-brand { background-color: #ff4757; color: white; }
    .btn-brand:hover { background-color: #e84118; color: white; }
    .btn-outline-brand { border-color: #ff4757; color: #ff4757; }
    .btn-outline-brand:hover { background-color: #ff4757; color: white; }
</style>
{% endblock %}
