{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4 shadow-lg animate-fade-in">
            <h1 class="hero-title h2 mb-4">Créer un sondage</h1>
            
            <form action="{{ url_for('poll.create_poll') }}" method="POST">
                <div class="mb-3">
                    <label for="question" class="form-label">Question</label>
                    <input type="text" class="form-control" id="question" name="question" required placeholder="Quelle est votre question ?">
                </div>
                
                <div id="options-container">
                    <div class="mb-3">
                        <label class="form-label">Options</label>
                        <input type="text" class="form-control mb-2" name="options" required placeholder="Option 1">
                        <input type="text" class="form-control mb-2" name="options" required placeholder="Option 2">
                    </div>
                </div>
                
                <button type="button" class="btn btn-outline-secondary mb-3 w-100" onclick="addOption()">
                    <i class="fas fa-plus me-2"></i>Ajouter une option
                </button>
                
                <button type="submit" class="btn btn-brand w-100">Créer le sondage</button>
            </form>
        </div>
    </div>
</div>

<script>
function addOption() {
    const container = document.getElementById('options-container');
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'form-control mb-2';
    input.name = 'options';
    input.placeholder = 'Nouvelle option';
    container.appendChild(input);
}
</script>
{% endblock %}
