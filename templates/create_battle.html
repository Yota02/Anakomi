{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-5 shadow-lg bg-dark text-white border-0" style="border-radius: 20px;">
                <h1 class="mb-4 fw-bold">⚔️ Créer une Battle Royale</h1>
                <p class="text-muted mb-4">Lancez un duel épique entre deux personnages aléatoires !</p>
                
                <form method="POST">
                    <div class="mb-4">
                        <label for="title" class="form-label fs-5">Titre de la Battle</label>
                        <input type="text" class="form-control form-control-lg bg-secondary text-white border-0" id="title" name="title" required placeholder="Ex: Waifu Wars 2024">
                    </div>
                    
                    <div class="alert alert-info bg-opacity-10 border-info text-info mb-5">
                        <i class="fas fa-dice me-2"></i> Deux personnages seront sélectionnés au hasard pour cette battle.
                    </div>
                    
                    <button type="submit" class="btn btn-brand btn-lg w-100 py-3 fw-bold">DÉMARRER LA BATTLE</button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-brand { background-color: #ff4757; color: white; border: none; }
    .btn-brand:hover { background-color: #e84118; color: white; }
    .bg-secondary { background-color: #2f3542 !important; }
    .form-control:focus { background-color: #2f3542; color: white; border: 1px solid #ff4757; box-shadow: none; }
</style>
{% endblock %}
