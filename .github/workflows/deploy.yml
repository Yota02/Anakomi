name: Deploy Flask App (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/Anakomi
            
            # Récupération des dernières modifications
            GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519_amichauxkinet -o StrictHostKeyChecking=no" git pull origin main
            
            # Construction de la nouvelle image Docker
            docker build -t anakomi-web .
            
            # Arrêt et suppression de l'ancien conteneur s'il existe
            docker stop anakomi_web || true
            docker rm anakomi_web || true
            
            # Relance du conteneur (Note: recréez un docker-compose.yml sur le serveur pour injecter les variables env plus proprement !)
            docker run -d \
              --name anakomi_web \
              -p 5000:5000 \
              --restart unless-stopped \
              anakomi-web
